name: 墨水屏综合看板推送

on:
  schedule:
    - cron: '0 6,12,15,18 * * *'  # 每天 6点、12点、15点、18点运行
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install lunar_python pillow requests zhdate

      - name: 运行墨水屏推送
        env:
          ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
          ZECTRIX_MAC: ${{ secrets.ZECTRIX_MAC }}
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
        run: python main.py
